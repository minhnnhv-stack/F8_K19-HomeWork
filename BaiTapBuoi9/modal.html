<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* Nút mở modal */
        .open-btn {
            display: block;          /* hiển thị dạng khối */
            background-color: #3b82f6;      /* màu nền xanh */
            color: #ffffff;                 /* màu chữ trắng */
            padding: 15px 25px;             /* khoảng cách bên trong (trên-dưới / trái-phải) */
            font-weight: bold;              /* chữ in đậm */
            cursor: pointer;               /* đổi con trỏ thành hình bàn tay khi hover */
            width: 80px;
            margin-bottom: 30px;
        }

        /* Lớp phủ nền khi mở modal */
        .overlay{
            display:none;                  /* mặc định ẩn */
            width: 500px;                  /* chiều rộng */
            height: 500px;                 /* chiều cao */
            background-color: rgba(0, 0, 0, 0.5); /* nền đen mờ (opacity 0.5) */
            padding-top: 30px;
            padding-left: 30px;
        }

        /* Khung modal */
        .modal{
            background-color: #ffffff;     /* nền trắng */
            width: 300px;                 /* chiều rộng modal */
            height: 150px;                /* chiều cao modal */
            padding: 15px 20px;           /* khoảng cách bên trong */
        }

        /* Nút đóng modal */
        .close-btn{
            background-color: #ef4444;     /* nền đỏ */
            color: #ffffff;               /* chữ trắng */
            padding: 15px 25px;           /* khoảng cách bên trong */
            font-weight: bold;            /* chữ đậm */
            cursor: pointer;              /* con trỏ dạng click */
        }

        /* Khi checkbox được check thì hiện overlay */
        #modal-toggle:checked ~ .overlay{
            display: block;               /* hiển thị overlay */
        }

        /* Ẩn checkbox (dùng để điều khiển modal) */
        #modal-toggle{
            display: none;                /* không hiển thị ra màn hình */
        }
    </style>
</head>
<body>

    <!-- Checkbox ẩn dùng để bật/tắt modal -->
    <input type="checkbox" name="modal-toggle" id="modal-toggle">

    <!-- Label này đóng vai trò là nút mở modal -->
    <label for="modal-toggle" class="open-btn">Mở modal</label>

    <!-- Overlay (click vào cũng sẽ đóng modal vì là label) -->
    <label for="modal-toggle" class="overlay">
        <div class="modal">
            <p>Đây là nội dung của thông báo !</p>

            <!-- Nút đóng modal -->
            <label for="modal-toggle" class="close-btn">Đóng</label>
        </div>
    </label>

</body>
</html>
