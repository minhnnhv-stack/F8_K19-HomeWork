<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: inline-block;
            margin-right: 30px;
            text-align: center;
            font-weight: bold;
        }
        .square{
            border: 3px red solid;
            width: 80px;
            height: 80px;
        }
        .rectangle{
            border: 3px blue solid;
            width: 180px;
            height: 80px;
        }
        .triangle{
            border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            width: 0px;
            height: 0px;
            border-bottom: 80px solid red;
        }
        .down-triangle{
            border-left: 40px solid transparent ;
            border-right: 40px solid transparent;
            border-top: 80px solid orange;
            width: 0px;
            height: 0px;
        }
        .left-triangle{
            border-right: 80px solid purple ;
            border-bottom: 40px solid transparent;
            border-top: 40px solid transparent;
            width: 0px;
            height: 0px;
        }
        .right-triangle{
            border-left: 80px solid rgb(122, 92, 37) ;
            border-bottom: 40px solid transparent;
            border-top: 40px solid transparent;
            width: 0px;
            height: 0px;
        }
        .trapezium{
             border-left: 40px solid transparent;
            border-right: 40px solid transparent;
            width: 100px;
            height: 0px;
            border-bottom: 80px solid goldenrod;
        }
        .big-triangle{
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            width: 0px;
            height: 0px;
            border-bottom: 60px solid burlywood;
        }
        .acute-triangle{
            border-left: 30px solid transparent;
            border-right: 30px solid transparent;
            width: 0px;
            height: 0px;
            border-bottom: 100px solid darkgrey;
        }
        .isosceles-triangle{
            border-left: 80px solid transparent;
            border-right: 80px solid transparent;
            width: 0px;
            height: 0px;
            border-bottom: 80px solid darkgreen;
        }
        .right-arrow{
            border-left: 70px solid rgb(38, 165, 150) ;
            border-bottom: 35px solid transparent;
            border-top: 35px solid transparent;
            width: 0px;
            height: 0px;
        }
        .left-arrow{
            border-right: 70px solid purple ;
            border-bottom: 35px solid transparent;
            border-top: 35px solid transparent;
            width: 0px;
            height: 0px;
        }
        .ribbon {
            display: inline-block;
            align-items: center;
        }

        .rec {
            width: 180px;
            height: 0;
            border-top: 40px solid red;
            border-bottom: 40px solid red;
            border-right: 40px solid transparent;
        }
        .F{
            display: inline-block;
            margin-right: 30px;
            vertical-align: top;
        }
        .eight{
             display: inline-block;
             /* vertical-align: top; */
        }

        .f-vertical {
            width: 0;
            height: 220px;
            border-left: 35px solid red;
            /* margin-top: 100px; */
        }
        .f-top-bar {
            width: 140px;
            height: 0;
            border-top: 35px solid red;
            margin-top: -220px; 
        }
        .f-middle-bar{
            width: 140px;
            height: 0;
            border-top: 35px solid red ;
            margin-top: 60px;
        }
        .eight-vertical{
            width: 0;
            height: 220px;
            border-left: 35px solid red;
        }
        .eight-top-bar{
            width: 140px;
            height: 0;
            border-top: 35px solid red;
            margin-top: -220px; 
        }
        .eight-middle-bar{
            width: 140px;
            height: 0;
            border-top: 35px solid red;
            margin-top: 60px;
        }
        .eight-bottom-bar{
            width: 140px;
            height: 0;
            border-top: 35px solid red;
            margin-top: 60px;
        }
          .eight-vertical-right{
            width: 0;
            height: 220px;
            border-left: 35px solid red;
            margin-left: 105px;
            margin-top: -220px;
          }
    </style>
</head>
<body>
    <div class="container"> 
        <div class="square"></div>
        <p>1.Hình vuông</p>
    </div>
    <div class="container">
        <div class="rectangle"></div>
        <p>2.Hình chữ nhật</p>
    </div>
    <div class="container">
        <div class="triangle"></div>
        <p>3.Hình tam giác lên</p>
    </div>
    <div class="container">
        <div class="down-triangle"></div>
         <p>4.Hình tam giác xuống</p>
    </div>
    <div class="container">
        <div class="left-triangle"></div>
         <p>5.Hình tam giác trái</p>
    </div>
    <div class="container">
        <div class="right-triangle"></div>
         <p>6.Hình tam giác phải</p>
    </div>
    <div class="container">
        <div class="trapezium"></div>
        <p>7.Hình thang </p>
    </div>
    <div class="container">
        <div class="big-triangle"></div>
         <p>8.Hình tam giác rộng</p>
    </div>
    <div class="container">
        <div class="acute-triangle"></div>
         <p>9.Hình tam giác nhọn</p>
    </div>
    <div class="container">
        <div class="isosceles-triangle"></div>
         <p>10.Hình tam giác cân</p>
    </div>
    <div class="container">
        <div class="right-arrow"></div>
         <p>11.Hình tam giác phải</p>
    </div>
    <div class="container">
        <div class="left-arrow"></div>
         <p>12.Hình tam giác trái</p>
    </div>
    <div class="container">
        <div class="ribbon">
        <div class="rec"></div>
    </div>
        <p>13.Ribbon / Lá cờ </p>
    </div>
    
    <div class="container">
        <div class="f8-large">
            <div class="F">
                <div class="f-vertical"></div>
                <div class="f-top-bar"></div>
                <div class="f-middle-bar"></div>
            </div>
            <div class="eight">
                <div class="eight-vertical"></div>
                <div class="eight-top-bar"></div>
                <div class="eight-middle-bar"></div>
                <div class="eight-bottom-bar"></div>
                <div class="eight-vertical-right"></div>
            </div>
        </div>
        <p>14.F8</p>
    </div>
</body>
</html>
