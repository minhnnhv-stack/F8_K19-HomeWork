<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/theme.css">
    <title>Document</title>
    <style>
        h1{
            color:black
        }
        .section{
            background:lightgray
        }
        p{
            font-weight: bold;
            color:blue
        }
    </style>
</head>
<body>
    <h1 class="title" id="special" style="color:yellowgreen" >COURSES PAGE</h1>
        <!--
    Phan tu nay co: tag(h1) + class(title) + id(special) + inline style
    Selector thang: inline style vi inline có độ ưu tien cao nhất inline style > id > class > tag

    Mau hien thi: yellowgreen
    -->
    <h2 class="title">Danh sach khoa hoc</h2>
    <div class="section">
        <p>HTML co ban</p>
        <p>CSS co ban</p>
        <p>Javascript nang cao</p>
        <p>ReactJS</p>
        <p>NodeJS</p>
    </div>
</body>
</html>
