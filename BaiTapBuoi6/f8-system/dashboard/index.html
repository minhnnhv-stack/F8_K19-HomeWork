    Vì vậy màu chữ cuối cùng hiển thị là brown.
    -->
    <h2 class="section">Tong quan he thong</h2>
    <h3 class="title">Courses</h3>

    <h3 class="title">Students</h3>
        <p class="highlight">Quan ly sinh vien</p>
    <h3 class="title">Teachers</h3>
        <p class="highlight">Quan ly giao vien</p>
    <h3 class="title">Orders</h3>
        <p class="highlight">Danh sach don hang</p>
    <h3 class="title">Reports</h3>
        <p class="highlight">Danh sach bao cao</p>
    </div>
</body>
</html>
